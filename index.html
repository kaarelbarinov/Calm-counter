<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket AOI MVP Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>POCKET AOI</h1>
    </header>
    <div class="container">
        <aside class="left-sidebar">
            <h2>Tool Selector</h2>
            <ul>
                <li>Tool 1</li>
                <li>Tool 2</li>
                <li>Tool 3</li>
            </ul>
            <h2>Filters</h2>
            <ul>
                <li>Filter 1</li>
                <li>Filter 2</li>
            </ul>
        </aside>
        <main class="central-viewport">
            <div class="camera-feed">
                <p>Camera Feed Here</p>
                <div class="roi-box"></div>
            </div>
        </main>
        <aside class="right-sidebar">
            <h2>Processed Image Preview</h2>
            <img src="processed-image.jpg" alt="Processed Image">
            <h2>Statistics</h2>
            <p>Statistics data here.</p>
        </aside>
    </div>
    <footer>
        <p>&copy; 2026 Pocket AOI. All rights reserved.</p>
    </footer>
</body>
</html>
